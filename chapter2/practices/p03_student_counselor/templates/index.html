<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생 상담 챗봇 — Chapter 2 실습</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; }
        h1 { color: #569cd6; margin-bottom: 4px; }
        .subtitle { color: #888; margin-bottom: 16px; font-size: 14px; }
        .options { display: flex; gap: 16px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
        .options label { font-size: 13px; color: #aaa; }
        .options select { background: #3c3c3c; color: #d4d4d4; border: 1px solid #555; border-radius: 4px; padding: 4px 8px; font-family: monospace; }
        .toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #aaa; }
        .toggle input { accent-color: #569cd6; }
        .chat-area { background: #252526; border-radius: 8px; height: 450px; overflow-y: auto; padding: 16px; margin-bottom: 12px; }
        .message { margin-bottom: 16px; padding: 10px 14px; border-radius: 8px; }
        .message.user { background: #2d2d30; }
        .message.assistant { background: #1e3a2f; }
        .message.thinking { background: #2d2a1e; border-left: 3px solid #dcdcaa; }
        .role { font-weight: bold; display: block; margin-bottom: 4px; font-size: 12px; }
        .message.user .role { color: #569cd6; }
        .message.assistant .role { color: #4ec9b0; }
        .message.thinking .role { color: #dcdcaa; }
        .text { white-space: pre-wrap; line-height: 1.6; }
        .input-area { display: flex; gap: 8px; }
        input[type="text"] { flex: 1; background: #3c3c3c; color: #d4d4d4; border: 1px solid #555; border-radius: 6px; padding: 10px; font-family: monospace; font-size: 14px; }
        button { background: #0e639c; color: white; border: none; border-radius: 6px; padding: 10px 20px; cursor: pointer; font-size: 14px; }
        button:hover { background: #1177bb; }
        button:disabled { background: #555; cursor: not-allowed; }
        button.reset { background: #c53534; }
        button.reset:hover { background: #d94745; }
        .token-info { margin-top: 8px; font-size: 12px; color: #888; }
        .system-msg { color: #888; font-style: italic; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>학생 상담 챗봇</h1>
        <p class="subtitle">학과·학년으로 달라지는 조건부 System Prompt와 adaptive thinking을 비교합니다</p>

        <div class="options">
            <div>
                <label>학과</label><br>
                <select id="dept">
                    {% for id, dept in departments.items() %}
                    <option value="{{ id }}">{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label>학년</label><br>
                <select id="grade">
                    <option value="1">1학년</option>
                    <option value="2">2학년</option>
                    <option value="3">3학년</option>
                </select>
            </div>
            <div class="toggle">
                <input type="checkbox" id="use-thinking">
                <label for="use-thinking">Adaptive Thinking 사용</label>
            </div>
        </div>

        <div id="chat-area" class="chat-area">
            <div id="messages"><div class="system-msg">학과와 학년을 선택하고 수강·학교생활·진로에 관해 질문하세요.</div></div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="예: 이번 학기에 어떤 과목을 먼저 들으면 좋을까요?"
                   onkeydown="if(event.key === 'Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">전송</button>
            <button class="reset" onclick="resetChat()">초기화</button>
        </div>
        <div id="token-info" class="token-info"></div>
    </div>

    <script>
        const sessionId = crypto.randomUUID();

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            appendMessage('user', message);
            input.value = '';
            input.disabled = true;
            document.getElementById('send-btn').disabled = true;

            const useThinking = document.getElementById('use-thinking').checked;
            let thinkingDiv = null;
            let assistantDiv = null;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        dept: document.getElementById('dept').value,
                        grade: document.getElementById('grade').value,
                        use_thinking: useThinking,
                        session_id: sessionId,
                    }),
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));

                        if (data.thinking) {
                            if (!thinkingDiv) thinkingDiv = appendMessage('thinking', '');
                            thinkingDiv.querySelector('.text').textContent = data.thinking;
                            scrollToBottom();
                        }
                        if (data.text) {
                            if (!assistantDiv) assistantDiv = appendMessage('assistant', '');
                            assistantDiv.querySelector('.text').textContent += data.text;
                            scrollToBottom();
                        }
                        if (data.done) {
                            document.getElementById('token-info').textContent =
                                `이번 호출의 토큰 · 입력 ${data.input_tokens} / 출력 ${data.output_tokens}`;
                        }
                    }
                }
            } catch (e) {
                if (!assistantDiv) assistantDiv = appendMessage('assistant', '');
                assistantDiv.querySelector('.text').textContent = '상담 답변을 받지 못했습니다. 서버 연결과 API 키를 확인하세요.';
            }
            input.disabled = false;
            document.getElementById('send-btn').disabled = false;
            input.focus();
        }

        function appendMessage(role, text) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const labels = { user: '학생', assistant: '상담 답변', thinking: '추론 요약' };
            const roleSpan = document.createElement('span');
            roleSpan.className = 'role';
            roleSpan.textContent = labels[role];
            const textSpan = document.createElement('span');
            textSpan.className = 'text';
            textSpan.textContent = text;
            div.append(roleSpan, textSpan);
            messages.appendChild(div);
            scrollToBottom();
            return div;
        }

        function scrollToBottom() {
            const area = document.getElementById('chat-area');
            area.scrollTop = area.scrollHeight;
        }

        async function resetChat() {
            await fetch('/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId }),
            });
            document.getElementById('messages').innerHTML = '<div class="system-msg">대화가 초기화되었습니다. 새로운 상담 질문을 입력하세요.</div>';
            document.getElementById('token-info').textContent = '';
        }
    </script>
</body>
</html>
