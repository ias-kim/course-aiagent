<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>음식점 후기 평가기</title>
  <!--
    프론트엔드는 의도적으로 최소화했습니다 (바닐라 HTML/CSS/JS).
    이 실습의 중점은 백엔드의 Anthropic SDK 사용과 출력 결과에 있습니다.
  -->
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 1.4rem; }
    .hint { color: #666; font-size: 0.9rem; }
    textarea { width: 100%; height: 140px; margin-top: 8px; box-sizing: border-box; font-family: inherit; padding: 8px; }
    button { margin-top: 10px; padding: 8px 18px; font-size: 1rem; cursor: pointer; }
    #result { margin-top: 24px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
    .stars { font-size: 1.6rem; letter-spacing: 2px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.85rem; color: #fff; }
    .badge.긍정 { background: #2e7d32; }
    .badge.중립 { background: #f9a825; }
    .badge.부정 { background: #c62828; }
    .summary { margin: 12px 0; }
    .keywords span { display: inline-block; background: #eef; border-radius: 6px; padding: 2px 8px; margin: 2px; font-size: 0.85rem; }
    .error { color: #c62828; }
  </style>
</head>
<body>
  <h1>음식점 후기 평가기</h1>
  <p class="hint">
    후기 <code>.txt</code> 파일을 열거나 직접 붙여넣고 <b>평가하기</b>를 누르세요.<br>
    LLM이 별점(1~5)·감정·요약·키워드를 검증된 구조로 반환합니다.
    (샘플 후기는 <code>reviews/</code> 폴더에 있습니다.)
  </p>

  <input type="file" id="file" accept=".txt">
  <textarea id="review" placeholder="후기 원문이 여기에 표시됩니다. 직접 입력할 수도 있습니다."></textarea>
  <button id="btn">평가하기</button>

  <div id="result"></div>

  <script>
    const fileInput = document.getElementById("file");
    const reviewBox = document.getElementById("review");
    const btn = document.getElementById("btn");
    const result = document.getElementById("result");

    // 1) 웹에서 .txt 파일을 읽어 텍스트 영역에 채웁니다 (FileReader).
    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => { reviewBox.value = reader.result; };
      reader.readAsText(file, "UTF-8");
    });

    // 실패 코드 → 사용자용 메시지
    const ERROR_MESSAGES = {
      empty: "후기 내용이 비어 있습니다.",
      too_long: "후기가 너무 깁니다. 더 짧게 입력해 주세요.",
      invalid_output: "평가 결과 형식이 올바르지 않습니다. 다시 시도해 주세요.",
      truncated: "응답이 중간에 잘렸습니다. 다시 시도해 주세요.",
      connection: "서버에 연결하지 못했습니다. 잠시 후 다시 시도해 주세요.",
      server_error: "일시적인 서버 오류입니다. 잠시 후 다시 시도해 주세요.",
      bad_request: "요청 형식이 올바르지 않습니다.",
    };

    // 2) 후기 텍스트를 Flask로 전송하고, 3) 받은 결과 JSON을 HTML로 렌더링합니다.
    btn.addEventListener("click", async () => {
      const review = reviewBox.value;
      result.innerHTML = "<p class='hint'>후기를 분석하고 결과 형식을 검증하는 중입니다...</p>";
      btn.disabled = true;
      try {
        const res = await fetch("/evaluate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ review }),
        });
        const data = await res.json();
        result.innerHTML = data.ok ? renderResult(data.evaluation) : renderError(data.error);
      } catch (e) {
        result.innerHTML = renderError("connection");
      } finally {
        btn.disabled = false;
      }
    });

    function renderResult(ev) {
      const stars = "★".repeat(ev.점수) + "☆".repeat(5 - ev.점수);
      const keywords = ev.키워드.map(k => `<span>${escapeHtml(k)}</span>`).join(" ");
      return `
        <div class="card">
          <div class="stars">${stars} <small>(${ev.점수}/5)</small>
            <span class="badge ${ev.감정}">${ev.감정}</span>
          </div>
          <p class="summary"><b>요약</b> · ${escapeHtml(ev.요약)}</p>
          <div class="keywords"><b>근거 키워드</b> · ${keywords}</div>
        </div>`;
    }

    function renderError(code) {
      const msg = ERROR_MESSAGES[code] || "알 수 없는 오류가 발생했습니다.";
      return `<p class="error">⚠ ${msg} <small>(${code})</small></p>`;
    }

    // LLM 출력은 외부 데이터이므로 화면에 넣기 전 이스케이프합니다 (XSS 방어).
    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
</body>
</html>
